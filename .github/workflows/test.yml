name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  suite:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test suite (1st pass)
        run: npm test

      - name: Test suite (2nd pass, determinism check)
        run: npm test

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate KDD contracts (Nivel 1)
        run: python scripts/validate_contracts.py knowledge/contracts
